<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoMo Transaction • My MoMo Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* Glass morphism card */
    .glass-card { 
      backdrop-filter: blur(16px) saturate(180%); 
      background-color: rgba(255, 255, 255, 0.15); 
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
    }

    /* Purple glass header style you requested */
    .glass-header {
      background: rgba(78, 52, 226, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    /* Input & Select Styling - Fixed dropdown visibility */
    select, input[type="text"], input[type="number"] {
      background-color: rgba(255, 255, 255, 0.2) !important;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white !important;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 1.1rem;
      outline: none;
      transition: all 0.3s;
    }

    select:focus, input:focus {
      background-color: rgba(255, 255, 255, 0.3) !important;
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.3);
    }

    /* Placeholder color */
    ::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    /* Fix dropdown arrow color in some browsers */
    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 12px;
    }

    /* Readonly input */
    .readonly-input {
      background-color: rgba(255,255,255,0.25) !important;
      color: white !important;
      font-weight: bold;
      cursor: not-allowed;
      text-align: center;
    }
  </style>
</head>
<body class="text-white flex items-center justify-center p-4 min-h-screen">

  <div class="glass-card rounded-3xl w-full max-w-md overflow-hidden">
    
    <!-- Header with your requested purple glass style -->
    <div class="glass-header text-center py-8 px-6">
      <i class="fas fa-mobile-alt text-6xl text-yellow-300 mb-3"></i>
      <h2 class="text-3xl font-bold">MoMo Transaction</h2>
      <p class="text-purple-200 text-lg">Fast • Secure • Reliable</p>
    </div>

    <div class="p-8">
      <form id="momoForm" class="space-y-6">

        <!-- AGENT NAME (LOCKED) -->
        <div>
          <label class="block text-sm font-semibold mb-2 text-purple-200">Agent</label>
          <input type="text" id="agent-name" class="readonly-input w-full" readonly value="Loading...">
        </div>

        <!-- TRANSACTION TYPE -->
        <div>
          <label class="block text-sm font-semibold mb-2 text-purple-200">Transaction Type</label>
          <select id="transaction-type" class="w-full" required>
            <option value="" disabled selected>Select Type</option>
            <option value="deposit">Deposit (Receive Money)</option>
            <option value="withdraw">Withdrawal (Send Money)</option>
          </select>
        </div>

        <!-- NETWORK -->
        <div>
          <label class="block text-sm font-semibold mb-2 text-purple-200">Network</label>
          <select id="network" class="w-full" required>
            <option value="" disabled selected>Select Network</option>
            <option value="MTN">MTN MoMo</option>
            <option value="Vodafone">Vodafone Cash</option>
            <option value="AirtelTigo">AirtelTigo Money</option>
          </select>
        </div>

        <!-- CUSTOMER PHONE -->
        <div>
          <label class="block text-sm font-semibold mb-2 text-purple-200">Customer Phone</label>
          <input type="text" id="customerNumber" placeholder="e.g. 0241234567" maxlength="10" required>
        </div>

        <!-- CUSTOMER NAME (AUTO-FILLED) -->
        <div>
          <label class="block text-sm font-semibold mb-2 text-purple-200">Customer Name</label>
          <input type="text" id="customerName" readonly placeholder="Auto-filled from system..." class="bg-white/10">
        </div>

        <!-- AMOUNT -->
        <div>
          <label class="block text-sm font-semibold mb-2 text-purple-200">Amount (GHS)</label>
          <input type="number" id="amount" placeholder="0.00" min="1" step="0.01" required>
        </div>

        <!-- REFERENCE -->
        <div>
          <label class="block text-sm font-semibold mb-2 text-purple-200">Reference (Optional)</label>
          <input type="text" id="reference" placeholder="e.g. School fees, Goods">
        </div>

        <!-- SUBMIT BUTTON - Smaller & Better Sized -->
        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold py-4 rounded-xl text-xl transition transform hover:scale-105 shadow-xl mt-8">
          <i class="fas fa-paper-plane mr-3"></i>
          <span id="submit-text">PROCESS TRANSACTION</span>
        </button>
      </form>

      <div class="text-center mt-6">
        <button onclick="history.back()" class="text-purple-300 hover:text-white text-sm">
          <i class="fas fa-arrow-left mr-2"></i> Go Back
        </button>
      </div>
    </div>
  </div>

<script>
  // ──────────────────────────────────────────────────────────────
  // 1. Load Agent Name (very robust – works with any login system)
  // ──────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", function () {
    const agentField = document.getElementById('agent-name');

    const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    const agentData   = JSON.parse(localStorage.getItem('agent') || '{}');
    const user        = JSON.parse(localStorage.getItem('user') || '{}');

    let fullName = "Agent";

    if (currentUser && Object.keys(currentUser).length) {
      fullName = currentUser.name ||
                 (currentUser.first_name && currentUser.last_name
                   ? `${currentUser.first_name} ${currentUser.last_name}`
                   : currentUser.username || currentUser.email || "Agent");
    }
    else if (agentData && (agentData.name || agentData.first_name)) {
      fullName = agentData.name || `${agentData.first_name || ''} ${agentData.last_name || ''}`.trim();
    }
    else if (user && (user.name || user.username)) {
      fullName = user.name || user.username || user.email || "Agent";
    }

    agentField.value = fullName.trim() || "My MoMo Agent";
  });

  // ──────────────────────────────────────────────────────────────
  // 2. Change button text when transaction type is selected
  // ──────────────────────────────────────────────────────────────
  document.getElementById('transaction-type').addEventListener('change', function () {
    const text = this.value === 'deposit' ? 'RECEIVE MONEY' : 'SEND MONEY';
    document.getElementById('submit-text').textContent = text;
  });

  // ──────────────────────────────────────────────────────────────
  // 3. Auto-fill customer name (mock – replace with real API later)
  // ──────────────────────────────────────────────────────────────
  async function fetchCustomerName(phone) {
    const mockDB = {
      "0541111111": "Kwame Adu",
      "0242222222": "Ama Serwaa",
      "0273333333": "Kofi Mensah",
      "0504444444": "Abena Pokuaa"
    };
    await new Promise(r => setTimeout(r, 400));
    return mockDB[phone] || "";
  }

  document.getElementById("customerNumber").addEventListener("input", async function () {
    const phone = this.value.trim();
    const nameField = document.getElementById("customerName");

    if (phone.length === 10 && phone.startsWith("0")) {
      nameField.value = "Fetching name...";
      const name = await fetchCustomerName(phone);
      nameField.value = name || "Not registered";
    } else {
      nameField.value = "";
    }
  });

  // ──────────────────────────────────────────────────────────────
  // 4. Form Submit – Main Transaction Logic
  // ──────────────────────────────────────────────────────────────
  document.getElementById("momoForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const type      = document.getElementById("transaction-type").value;
    const network   = document.getElementById("network").value;
    const phone     = document.getElementById("customerNumber").value.trim();
    const amount    = document.getElementById("amount").value;
    const ref       = document.getElementById("reference").value.trim() || "MoMo Transaction";
    const agentName = document.getElementById("agent-name").value;

    // ─── Validation ───
    if (!type || !network || !phone || !amount) {
      return Swal.fire({icon: 'warning', title: 'Missing Fields', text: 'Please fill all required fields'});
    }
    if (!/^0\d{9}$/.test(phone)) {
      return Swal.fire({icon: 'error', title: 'Invalid Phone', text: 'Must be 10 digits starting with 0'});
    }

    const transactionId = "TXN" + Date.now();

    try {
      const res = await fetch("http://localhost:8000/withdraw", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          phone: "233" + phone.slice(1),
          amount: Number(amount),
          id: transactionId,
          type: type,
          agent_name: agentName,
          network: network,
          reference: ref
        })
      });

      const data = await res.json();

      // ─── SUCCESS ───
      if (data.status) {
        Swal.fire({
          icon: 'success',
          title: type === 'deposit' ? 'Money Received Successfully!' : 'Money Sent Successfully!',
          html: `
            <div class="text-center">
              <p class="text-3xl font-bold text-green-400 mb-2">GHS ${amount}</p>
              <p class="text-lg">${type === 'deposit' ? 'Received from' : 'Sent to'}</p>
              <p class="text-2xl font-bold text-white mt-1">
                ${document.getElementById("customerName").value || phone}
              </p>
              <div class="mt-4 text-sm opacity-90">
                <p>Agent: <strong>${agentName}</strong></p>
                <p>Network: <strong>${network}</strong></p>
                <p>Ref: <strong>${data.referenceId || transactionId}</strong></p>
              </div>
            </div>
          `,
          timer: 10000,
          timerProgressBar: true,
          showConfirmButton: true,
          confirmButtonText: 'View Receipt',
          confirmButtonColor: '#10b981',
          background: '#1f2937',
          color: '#e5e7eb',
          customClass: { popup: 'rounded-2xl shadow-2xl' }
        }).then((result) => {
          // Save receipt and go to receipt page
          sessionStorage.setItem('lastTransaction', JSON.stringify({
            type,
            network,
            agent_name: agentName,
            customer_name: document.getElementById("customerName").value || "Customer",
            customer_phone: phone,
            amount,
            reference: ref,
            transactionId,
            momoRef: data.referenceId || transactionId,
            date: new Date().toLocaleString(),
            status: 'success'
          }));

          if (result.isConfirmed || result.dismiss === Swal.DismissReason.timer) {
            window.location.href = "reciept.html";
          }
        });

      // ─── FAILURE ───
      } else {
        Swal.fire({
          icon: 'error',
          title: 'Transaction Failed',
          text: data.message || "Please try again later."
        });
      }

    } catch (err) {
      console.error(err);
      Swal.fire({
        icon: 'error',
        title: 'Connection Error',
        text: 'Cannot reach server. Check your internet connection.'
      });
    }
  });
</script>
</body>
</html>
