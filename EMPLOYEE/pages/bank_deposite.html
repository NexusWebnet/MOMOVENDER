<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank Deposit</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/bank_deposite.css" />

    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- BANK SELECTION PAGE -->
    <section id="bank-selection" class="container">
        <h2>Select Bank</h2>

        <div class="bank-card" onclick="selectBank('Fidelity Bank')">
            <i class="fas fa-piggy-bank"></i>
            <span>Fidelity Bank</span>
        </div>

        <div class="bank-card" onclick="selectBank('Access Bank')">
            <i class="fas fa-landmark"></i>
            <span>Access Bank</span>
        </div>
    </section>


    <!-- BANK DEPOSIT FORM PAGE -->
    <section id="deposit-form" class="container hidden">
        <h2 id="selectedBank"></h2>

        <form id="bankDepositForm">

            <label>Customer Name</label>
            <input type="text" id="customerName" required>

            <label>Amount</label>
            <input type="number" id="depositAmount" required>

            <label>Transaction ID / Reference</label>
            <input type="text" id="transactionId" required>

            <button type="button" onclick="generateReceipt()">Submit & Print Receipt</button>
        </form>
    </section>

    <!-- JS -->
    <script src="../js/bank_deposite.js"></script>

</body>
</html>
