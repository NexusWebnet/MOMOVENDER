<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Agents • My MoMo Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      font-family: 'Segoe UI', sans-serif;
    }
    .glass { 
      backdrop-filter: blur(16px) saturate(180%); 
      background-color: rgba(255, 255, 255, 0.12); 
      border: 1px solid rgba(255, 255, 255, 0.2); 
    }
    .sidebar { 
      transition: transform 0.3s ease-in-out; 
    }
    @media (max-width: 768px) {
      .sidebar { 
        transform: translateX(-100%); 
      }
      .sidebar.open { 
        transform: translateX(0); 
      }
    }
  </style>
</head>
<body class="text-white min-h-screen">

  <!-- Mobile Menu Button -->
  <button id="menu-btn" class="md:hidden fixed top-6 left-6 z-50 bg-white/20 p-4 rounded-2xl backdrop-blur-lg shadow-xl">
    <i class="fas fa-bars text-2xl"></i>
  </button>

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed md:static inset-y-0 left-0 z-40 w-80 glass shadow-2xl flex flex-col">
      <div class="p-8 text-center border-b border-white/20">
        <div class="w-28 h-28 bg-white/20 rounded-full mx-auto mb-4 flex items-center justify-center text-5xl font-bold">
          A
        </div>
        <h2 class="text-3xl font-bold">Welcome Admin</h2>
        <p class="text-purple-200 mt-2">Queen of the Shop 👑</p>
      </div>

      <nav class="flex-1 p-6">
        <ul class="space-y-4">
          <li>
            <a href="admin.html" class="flex items-center gap-5 py-5 px-8 rounded-2xl hover:bg-white/10 transition">
              <i class="fas fa-tachometer-alt text-xl"></i>
              <span class="text-xl font-medium">Overview</span>
            </a>
          </li>
          <li>
            <a href="admin-agents.html" class="flex items-center gap-5 py-5 px-8 rounded-2xl bg-white/20 shadow-lg">
              <i class="fas fa-users text-xl"></i>
              <span class="text-xl font-medium">Manage Agents</span>
            </a>
          </li>
          <li>
            <a href="admin-float.html" class="flex items-center gap-5 py-5 px-8 rounded-2xl hover:bg-white/10 transition">
              <i class="fas fa-wallet text-xl"></i>
              <span class="text-xl font-medium">Float Control</span>
            </a>
          </li>
          <li>
            <a href="admin-payroll.html" class="flex items-center gap-5 py-5 px-8 rounded-2xl hover:bg-white/10 transition">
              <i class="fas fa-money-bill-wave text-xl"></i>
              <span class="text-xl font-medium">Pay Salaries</span>
            </a>
          </li>
          <li>
            <a href="admin-reports.html" class="flex items-center gap-5 py-5 px-8 rounded-2xl hover:bg-white/10 transition">
              <i class="fas fa-chart-bar text-xl"></i>
              <span class="text-xl font-medium">Reports</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="p-6 border-t border-white/20 text-center">
        <p class="text-sm opacity-80">© 2025 My MoMo Empire</p>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8 md:p-12">
      <div class="max-w-7xl mx-auto">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
          <h1 class="text-5xl font-bold">Manage Agents</h1>
          <button onclick="openAddModal()" class="bg-white/20 p-4 rounded-2xl glass hover:bg-white/30 transition">
            <i class="fas fa-plus text-2xl"></i> Add Agent
          </button>
        </div>

        <!-- Search & Filter -->
        <div class="glass p-6 rounded-3xl mb-8">
          <div class="flex flex-col md:flex-row gap-4">
            <input type="text" id="search-agent" placeholder="Search by name or phone..." class="flex-1 px-6 py-4 rounded-2xl bg-white/10 text-white placeholder-purple-300">
            <select id="status-filter" class="px-6 py-4 rounded-2xl bg-white/10 text-white">
              <option value="">All Status</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
            <button onclick="loadAgents()" class="bg-white/20 px-8 py-4 rounded-2xl hover:bg-white/30">
              <i class="fas fa-search mr-2"></i> Filter
            </button>
          </div>
        </div>

        <!-- Agents Table -->
        <div class="glass rounded-3xl overflow-hidden shadow-2xl">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-white/10">
                <tr>
                  <th class="p-6 text-left text-xl font-bold">Agent Name</th>
                  <th class="p-6 text-left text-xl font-bold">Phone</th>
                  <th class="p-6 text-left text-xl font-bold">Username</th>
                  <th class="p-6 text-left text-xl font-bold">Float Balance</th>
                  <th class="p-6 text-left text-xl font-bold">Today's Sales</th>
                  <th class="p-6 text-left text-xl font-bold">Status</th>
                  <th class="p-6 text-left text-xl font-bold">Actions</th>
                </tr>
              </thead>
              <tbody id="agents-table">
                <tr>
                  <td colspan="7" class="p-12 text-center text-purple-300 text-xl">Loading agents...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Add/Edit Agent Modal -->
  <div id="agent-modal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4">
    <div class="glass p-10 rounded-3xl max-w-md w-full">
      <h2 id="modal-title" class="text-3xl font-bold text-center mb-8">Add New Agent</h2>
      <form id="agent-form">
        <input type="hidden" id="edit-id">
        <div class="space-y-6">
          <input type="text" id="first-name" placeholder="First Name" class="w-full px-6 py-4 rounded-2xl bg-white/10 text-white placeholder-purple-300" required>
          <input type="text" id="last-name" placeholder="Last Name" class="w-full px-6 py-4 rounded-2xl bg-white/10 text-white placeholder-purple-300" required>
          <input type="text" id="username" placeholder="Username" class="w-full px-6 py-4 rounded-2xl bg-white/10 text-white placeholder-purple-300" required>
          <input type="tel" id="phone" placeholder="Phone Number" class="w-full px-6 py-4 rounded-2xl bg-white/10 text-white placeholder-purple-300" required>
          <input type="password" id="password" placeholder="Password (leave blank to keep)" class="w-full px-6 py-4 rounded-2xl bg-white/10 text-white placeholder-purple-300">
          <select id="status" class="w-full px-6 py-4 rounded-2xl bg-white/10 text-white">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <div class="flex gap-6 mt-10">
          <button type="submit" class="flex-1 bg-purple-600 text-white py-4 rounded-2xl font-bold hover:bg-purple-700">
            Save Agent
          </button>
          <button type="button" onclick="closeModal()" class="flex-1 bg-gray-500 text-white py-4 rounded-2xl">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token') || '';

    async function loadAgents() {
      const search = document.getElementById('search-agent').value.toLowerCase();
      const status = document.getElementById('status-filter').value;

      const params = new URLSearchParams();
      if (search) params.append('search', search);
      if (status) params.append('status', status);

      const res = await fetch(`/api/admin/agents?${params}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const agents = await res.json();

      const tbody = document.getElementById('agents-table');
      tbody.innerHTML = '';
      agents.forEach(agent => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-white/10';
        tr.innerHTML = `
          <td class="p-6 font-bold text-xl">${agent.first_name} ${agent.last_name}</td>
          <td class="p-6">${agent.phone}</td>
          <td class="p-6">@${agent.username}</td>
          <td class="p-6 text-green-400 font-bold text-xl">GHS ${Number(agent.balance || 0).toLocaleString()}</td>
          <td class="p-6 text-blue-400 font-bold">GHS ${Number(agent.today_sales || 0).toLocaleString()}</td>
          <td class="p-6">
            <span class="px-6 py-2 rounded-full font-bold ${agent.status === 'active' ? 'bg-green-500/20 text-green-300' : 'bg-red-500/20 text-red-300'}">
              ${agent.status}
            </span>
          </td>
          <td class="p-6">
            <button onclick="editAgent(${agent.id})" class="mr-4 text-blue-400 hover:text-blue-200 font-bold">Edit</button>
            <button onclick="deleteAgent(${agent.id})" class="text-red-400 hover:text-red-200 font-bold">Delete</button>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    function openAddModal() {
      document.getElementById('modal-title').textContent = 'Add New Agent';
      document.getElementById('agent-form').reset();
      document.getElementById('edit-id').value = '';
      document.getElementById('agent-modal').classList.remove('hidden');
    }

    async function editAgent(id) {
      const res = await fetch(`/api/admin/agents/${id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const agent = await res.json();

      document.getElementById('modal-title').textContent = 'Edit Agent';
      document.getElementById('edit-id').value = agent.id;
      document.getElementById('first-name').value = agent.first_name;
      document.getElementById('last-name').value = agent.last_name;
      document.getElementById('username').value = agent.username;
      document.getElementById('phone').value = agent.phone;
      document.getElementById('status').value = agent.status;
      document.getElementById('password').placeholder = 'Leave blank to keep current';
      openAddModal();
    }

    async function deleteAgent(id) {
      if (!confirm('Delete this agent? All their data will be lost.')) return;
      await fetch(`/api/admin/agents/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      loadAgents();
    }

    document.getElementById('agent-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const formData = {
        first_name: document.getElementById('first-name').value,
        last_name: document.getElementById('last-name').value,
        username: document.getElementById('username').value,
        phone: document.getElementById('phone').value,
        status: document.getElementById('status').value,
        password: document.getElementById('password').value
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `/api/admin/agents/${id}` : '/api/admin/agents';

      await fetch(url, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(formData)
      });

      document.getElementById('agent-modal').classList.add('hidden');
      loadAgents();
    });

    function closeModal() {
      document.getElementById('agent-modal').classList.add('hidden');
    }

    // Search on keyup
    document.getElementById('search-agent').addEventListener('keyup', loadAgents);

    // Load on page open
    loadAgents();

    // Mobile menu
    document.getElementById('menu-btn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });
  </script>
</body>
</html>
